<style>
        body {
            background-color: #0b1326;
            color: #dae2fd;
            overflow: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neon-glow {
            box-shadow: 0 0 20px rgba(183, 109, 255, 0.3);
        }
        .neumorphic-inset {
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5), inset -2px -2px 5px rgba(255,255,255,0.05);
        }
        .scanning-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #ddb7ff, transparent);
            position: absolute;
            width: 100%;
            top: 50%;
            animation: scan 3s infinite ease-in-out;
        }
        @keyframes scan {
            0%, 100% { transform: translateY(-100px); opacity: 0; }
            50% { transform: translateY(100px); opacity: 1; }
        }
    </style>

    body {

<body class="font-body-md text-on-background min-h-screen flex flex-col items-center justify-center p-md relative">
<!-- Background Orbs -->
<div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-primary/10 blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-secondary-container/10 blur-[120px] pointer-events-none"></div>
<!-- Top AppBar (Identity Only - Nav suppressed for Onboarding) -->
<header class="fixed top-0 left-0 w-full flex justify-center items-center px-6 py-4 z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-purple-500" data-icon="bubble_chart">bubble_chart</span>
<span class="text-xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500 font-inter tracking-tight">EmotionSense</span>
</div>
</header>
<main class="w-full max-w-lg flex flex-col items-center gap-xl z-10">
<!-- Illustration Container -->
<div class="relative w-64 h-64 md:w-80 md:h-80 flex items-center justify-center">
<!-- Background Halo -->
<div class="absolute inset-0 bg-primary/20 rounded-full blur-[40px] animate-pulse"></div>
<!-- Glassmorphism Face Illustration -->
<div class="glass-card w-full h-full rounded-xl flex items-center justify-center relative overflow-hidden group">
<div class="relative w-48 h-60 border-2 border-white/10 rounded-[4rem] flex flex-col items-center pt-12">
<!-- Eyes -->
<div class="flex gap-8 mb-10">
<div class="w-4 h-4 rounded-full bg-primary neon-glow"></div>
<div class="w-4 h-4 rounded-full bg-primary neon-glow"></div>
</div>
<!-- Smile Curve -->
<div class="w-24 h-12 border-b-4 border-primary rounded-full opacity-80"></div>
<!-- Scanner Mesh UI -->
<div class="absolute inset-0 opacity-20 pointer-events-none">
<div class="grid grid-cols-6 h-full w-full">
<div class="border-r border-white/20"></div>
<div class="border-r border-white/20"></div>
<div class="border-r border-white/20"></div>
<div class="border-r border-white/20"></div>
<div class="border-r border-white/20"></div>
</div>
</div>
<!-- Scanning Line -->
<div class="scanning-line"></div>
</div>
<!-- Floating Data Chips -->
<div class="absolute top-4 right-4 glass-card px-3 py-1 rounded-full text-[10px] font-label-bold text-primary border-primary/30 flex items-center gap-1">
<span class="material-symbols-outlined text-[12px]" data-icon="auto_awesome">auto_awesome</span>
                    98.4% MATCH
                </div>
<div class="absolute bottom-8 left-4 glass-card px-3 py-1 rounded-full text-[10px] font-label-bold text-secondary border-secondary/30 flex items-center gap-1">
<span class="material-symbols-outlined text-[12px]" data-icon="favorite">favorite</span>
                    JOY DETECTED
                </div>
</div>
</div>
<!-- Text Content -->
<div class="text-center space-y-md px-container-padding">
<h1 class="font-display-xl text-display-xl text-on-surface">
                See Every <span class="bg-clip-text text-transparent bg-gradient-to-r from-primary to-secondary">Smile</span>
</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-sm mx-auto">
                Advanced AI tracks facial expressions to decode emotions instantly.
            </p>
</div>
<!-- Progress and Actions -->
<div class="w-full flex flex-col items-center gap-lg mt-md">
<!-- Swipe Indicator -->
<div class="flex gap-3">
<div class="w-8 h-2 rounded-full bg-primary neon-glow"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
</div>
<!-- CTA Button -->
<button class="group relative px-xl py-md bg-gradient-to-r from-blue-600 to-purple-600 rounded-full font-label-bold text-on-primary-container shadow-[0_0_20px_rgba(168,85,247,0.4)] hover:scale-105 active:scale-95 transition-all duration-200">
<span class="flex items-center gap-2">
                    Next
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</span>
<!-- Drop Glow -->
<div class="absolute inset-0 bg-primary/20 blur-xl opacity-0 group-hover:opacity-100 transition-opacity rounded-full -z-10"></div>
</button>
<button class="text-on-surface-variant/60 font-label-bold hover:text-on-surface transition-colors">
                Skip

</div>
