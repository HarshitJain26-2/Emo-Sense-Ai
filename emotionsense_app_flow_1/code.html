<body class="bg-background text-on-background min-h-screen flex items-center justify-center overflow-hidden font-body-md">
<!-- Background Layer with Dynamic Orbs -->
<div class="fixed inset-0 z-0">
<div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] orb-blur-1 opacity-20"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] orb-blur-2 opacity-25"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full bg-[radial-gradient(circle_at_center,_transparent_0%,_#0b1326_90%)]"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center justify-center w-full px-container-padding text-center">
<!-- Animated Logo Container -->
<div class="relative mb-lg group">
<!-- Outer Glow Ring -->
<div class="absolute inset-0 bg-gradient-to-tr from-blue-500 to-purple-600 rounded-full blur-2xl opacity-20 group-hover:opacity-40 transition-opacity duration-700"></div>
<!-- Logo Shell -->
<div class="relative glass-glow w-32 h-32 md:w-40 md:h-40 rounded-full flex items-center justify-center border border-white/20 shadow-[inset_0_0_20px_rgba(255,255,255,0.05)]">
<!-- Brand Icon -->
<span class="material-symbols-outlined text-[64px] md:text-[80px] bg-clip-text text-transparent bg-gradient-to-tr from-blue-400 to-purple-400 neon-text-glow" style="font-variation-settings: 'FILL' 1;">
                    bubble_chart
                </span>
</div>
<!-- Pulsing Orbitals -->
<div class="absolute -inset-4 border border-white/5 rounded-full scale-110 opacity-30"></div>
<div class="absolute -inset-8 border border-white/5 rounded-full scale-125 opacity-10"></div>
</div>
<!-- Typography Branding -->
<div class="space-y-sm">
<h1 class="font-display-xl text-display-xl tracking-tighter bg-clip-text text-transparent bg-gradient-to-b from-white to-white/60">
                EmotionSense
            </h1>
<p class="font-body-lg text-body-lg text-slate-400 tracking-wide max-w-xs mx-auto">
                Understand emotions. In real time.
            </p>
</div>
<!-- Interactive CTA / Progress Indicator -->
<div class="mt-xl w-full max-w-[280px]">
<!-- Subtle Loading Bar -->
<div class="h-[2px] w-full bg-white/5 rounded-full overflow-hidden mb-md">
<div class="h-full w-1/3 bg-gradient-to-r from-blue-500 to-purple-500 shadow-[0_0_10px_rgba(168,85,247,0.5)]"></div>
</div>
<button class="w-full py-4 px-lg font-label-bold text-label-bold rounded-full bg-gradient-to-r from-secondary-container to-primary-container text-white shadow-[0_8px_32px_-8px_rgba(168,85,247,0.6)] hover:scale-105 active:scale-95 transition-all duration-300 flex items-center justify-center gap-2 group">
                Enter Experience
                <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">
                    arrow_forward_ios
                </span>
</button>
</div>
</main>
<!-- Decorative Bottom Detail -->
<div class="fixed bottom-lg left-1/2 -translate-x-1/2 flex items-center gap-sm opacity-40">
<div class="w-1 h-1 rounded-full bg-purple-400"></div>
<span class="font-label-bold text-[10px] uppercase tracking-[0.2em] text-slate-500">Neural Sync Active</span>
