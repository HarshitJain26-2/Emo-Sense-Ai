<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .neon-border-glow {
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.4), inset 0 0 15px rgba(59, 130, 246, 0.4);
    }
    .glass-effect {
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .neumorphic-pop {
      box-shadow: -4px -4px 10px rgba(255, 255, 255, 0.05), 4px 4px 10px rgba(0, 0, 0, 0.5);
    }
    .neumorphic-inset {
      box-shadow: inset -4px -4px 10px rgba(255, 255, 255, 0.05), inset 4px 4px 10px rgba(0, 0, 0, 0.5);
    }
    .audio-bar {
      width: 4px;
      border-radius: 2px;
      background: linear-gradient(to top, #3b82f6, #a855f7);
    }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface font-body-md overflow-hidden h-screen flex flex-col">
<!-- Background Orbs -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-secondary/10 rounded-full blur-[120px]"></div>
</div>
<!-- Header: Shared Component TopAppBar -->
<header class="flex justify-between items-center px-6 py-4 w-full z-50 bg-black/40 backdrop-blur-xl border-b border-white/10 docked full-width top-0">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-purple-500">bubble_chart</span>
<span class="font-inter tracking-tight font-bold text-xl font-black bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">EmotionSense</span>
</div>
<div class="flex items-center gap-4">
<button class="text-slate-400 hover:opacity-80 transition-opacity active:scale-95 duration-150">
<span class="material-symbols-outlined">account_circle</span>
</button>
</div>
</header>
<!-- Main Canvas: Full Screen Detection View -->
<main class="flex-1 relative flex flex-col items-center justify-center overflow-hidden">
<!-- Camera View Placeholder -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-80" data-alt="A cinematic, shallow depth of field portrait of a young woman smiling warmly in a dark, high-tech interior environment. The lighting is dominated by soft teal and vibrant purple neon glows reflecting off her skin. The background is a sophisticated tech laboratory with blurred server lights and glass interfaces. The overall mood is futuristic, empathetic, and technologically advanced with a deep-space aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBgNqkqIy3kiVUqDDCJyELjWf4V2gfgtw2qG63HRYbPj9mrtC5e561xL07aHzZaSLdb0oAmNliE5AeE5x4lB-GMazSglNB_ttsnZ9UO8Bauv73J99M75x6BBQaM6ATTpg1WIK-KGoa6grWE3NADggvA4wiYK3c6nBB_f1IBQxSu-ZI9Ue3IZuRqW76NH1nKZhoYkfdETqJG1Q59aZ1dphAFRJG1hr-dSPROQ5O_dxdXrQcPl_OkiVt1PfLr0qCqgRvSknE2cDMDYA"/>
</div>
<!-- Neon Bounding Box -->
<div class="relative z-10 w-64 h-84 md:w-80 md:h-96 border-2 border-primary-container rounded-lg neon-border-glow flex flex-col items-center justify-start p-6">
<!-- Corners for tech feel -->
<div class="absolute -top-1 -left-1 w-6 h-6 border-t-4 border-l-4 border-white rounded-tl-md"></div>
<div class="absolute -top-1 -right-1 w-6 h-6 border-t-4 border-r-4 border-white rounded-tr-md"></div>
<div class="absolute -bottom-1 -left-1 w-6 h-6 border-b-4 border-l-4 border-white rounded-bl-md"></div>
<div class="absolute -bottom-1 -right-1 w-6 h-6 border-b-4 border-r-4 border-white rounded-br-md"></div>
<!-- Floating Real-time Label -->
<div class="glass-effect px-4 py-2 rounded-full absolute -top-12 flex items-center gap-2 border border-primary/30">
<span class="w-2 h-2 bg-primary rounded-full animate-pulse shadow-[0_0_8px_#ddb7ff]"></span>
<span class="font-label-bold text-primary text-label-bold">Joy detected 94%</span>
</div>
</div>
<!-- UI Overlay Bottom Section -->
<div class="absolute bottom-32 left-0 right-0 z-20 flex flex-col items-center gap-8 px-6">
<!-- Detection Controls Card -->
<div class="w-full max-w-lg glass-effect rounded-lg p-6 flex flex-col gap-6">
<div class="flex justify-between items-center">
<div class="flex flex-col">
<span class="text-on-surface-variant text-label-bold">CURRENT EMOTION</span>
<span class="text-headline-md font-headline-md text-white">Ecstatic &amp; Positive</span>
</div>
<div class="flex gap-2">
<div class="neumorphic-pop p-3 rounded-full glass-effect flex items-center justify-center">
<span class="material-symbols-outlined text-secondary">share</span>
</div>

<span class="material-symbols-outlined text-secondary">bookmark</span>
</div>

</div>

<span class="material-symbols-outlined text-white text-3xl font-bold" data-weight="fill">pause</span>
</button>
</div>
</main>

<nav class="fixed bottom-8 left-1/2 -translate-x-1/2 flex justify-around items-center px-4 py-2 z-50 bg-white/5 backdrop-blur-2xl w-[90%] max-w-md rounded-full border border-white/20 shadow-[0_8px_32px_0_rgba(0,0,0,0.8)]">

</div>
<div class="bg-gradient-to-tr from-blue-600 to-purple-600 text-white rounded-full p-3 shadow-[0_0_15px_rgba(168,85,247,0.5)] active:ring-2 active:ring-purple-400/30 active:scale-110 duration-200">
<span class="material-symbols-outlined">analytics</span>
