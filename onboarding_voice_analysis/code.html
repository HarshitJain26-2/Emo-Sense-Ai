<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary": "#640039",
                    "surface": "#0b1326",
                    "on-secondary": "#002e6a",
                    "on-surface-variant": "#cfc2d6",

                    "surface-container-high": "#222a3d",
                    "on-secondary-container": "#e6ecff",
                    "on-error": "#690005",
                    "on-tertiary-fixed": "#3e0022",
                    "on-tertiary-fixed-variant": "#8c0053",
                    "on-surface": "#dae2fd",
                    "surface-tint": "#ddb7ff",
                    "outline": "#988d9f",
                    "outline-variant": "#4d4354",
                    "surface-dim": "#0b1326",
                    "secondary-container": "#0566d9",
                    "on-primary-fixed-variant": "#6900b3",
                    "error-container": "#93000a",
                    "inverse-primary": "#842bd2",
                    "secondary-fixed": "#d8e2ff",
                    "on-primary-fixed": "#2c0051",
                    "surface-container-low": "#131b2e",
                    "primary-fixed-dim": "#ddb7ff",
                    "error": "#ffb4ab",
                    "on-error-container": "#ffdad6",
                    "primary": "#ddb7ff",
                    "tertiary": "#ffb0cd",
                    "primary-container": "#b76dff",
                    "surface-container-highest": "#2d3449",
                    "secondary-fixed-dim": "#adc6ff",

                    "surface-variant": "#2d3449",
                    "surface-container-lowest": "#060e20",
                    "background": "#0b1326",
                    "on-primary": "#490080",
                    "tertiary-fixed": "#ffd9e4",
                    "on-background": "#dae2fd",
                    "secondary": "#adc6ff",
                    "surface-container": "#171f33",
                    "on-tertiary-container": "#570032",
                    "on-secondary-fixed": "#001a42",
                    "primary-fixed": "#f0dbff",

            "spacing": {

                    "base": "8px",

                    "xl": "48px"
            },
            "fontFamily": {
                    "headline-md": ["Inter"],
                    "display-xl": ["Inter"],
                    "label-bold": ["Inter"],
                    "body-lg": ["Inter"],
                    "headline-lg": ["Inter"],
                    "body-md": ["Inter"]
            },
            "fontSize": {

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .neon-glow-blue {
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
      }
      .neon-border {
        border: 2px solid transparent;
        background: linear-gradient(to right, #0b1326, #0b1326) padding-box,
                    linear-gradient(to bottom right, #3B82F6, #A855F7) border-box;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen overflow-hidden flex flex-col items-center justify-center">
<!-- Ambient Orbs -->
<div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-secondary-container/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary-container/10 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Top Navigation Anchor (As per Shell Visibility Rule: Suppressed for Transactional/Onboarding, but brand identity maintained) -->
<header class="fixed top-0 left-0 w-full flex justify-between items-center px-6 py-4 z-50">
<div class="text-xl font-black bg-clip-text text-transparent bg-gradient-to-r from-secondary to-primary font-display-xl tracking-tight">
            EmotionSense
        </div>
<button class="text-slate-400 font-label-bold hover:text-white transition-colors">
            Skip
        </button>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-lg px-container-padding flex flex-col items-center text-center space-y-xl">
<!-- Illustration Container -->
<div class="relative w-full aspect-square flex items-center justify-center">
<!-- Pulsing Halo -->
<div class="absolute inset-0 bg-secondary/5 rounded-full animate-pulse blur-3xl"></div>
<!-- Audio Waveform Visualization -->
<div class="glass-card neon-border rounded-lg w-72 h-72 flex items-center justify-center p-md relative overflow-hidden">
<div class="flex items-end space-x-2 h-32">
<div class="w-2 bg-secondary rounded-full animate-[bounce_1.2s_infinite]" style="height: 40%"></div>
<div class="w-2 bg-secondary rounded-full animate-[bounce_1.5s_infinite]" style="height: 70%"></div>
<div class="w-2 bg-primary rounded-full animate-[bounce_1s_infinite]" style="height: 100%"></div>
<div class="w-2 bg-secondary rounded-full animate-[bounce_1.8s_infinite]" style="height: 60%"></div>
<div class="w-2 bg-secondary rounded-full animate-[bounce_1.3s_infinite]" style="height: 85%"></div>
<div class="w-2 bg-primary rounded-full animate-[bounce_1.6s_infinite]" style="height: 50%"></div>
<div class="w-2 bg-secondary rounded-full animate-[bounce_1.1s_infinite]" style="height: 30%"></div>
</div>
<!-- Overlay Glow -->
<div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-secondary/20 to-transparent"></div>
</div>
<!-- Floating Micro-Interaction -->
<div class="absolute top-10 right-10 glass-card p-sm rounded-md flex items-center space-x-xs neon-glow-blue">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">graphic_eq</span>
<span class="font-label-bold text-[12px] uppercase tracking-widest text-secondary">Analyzing...</span>
</div>
</div>
<!-- Text Content -->
<div class="space-y-sm">
<h1 class="font-display-xl text-headline-lg bg-clip-text text-transparent bg-gradient-to-b from-white to-slate-400">
                Hear Every Note
            </h1>
<p class="font-body-lg text-on-surface-variant max-w-[320px] mx-auto">
                Our voice analysis detects the subtle tones in your speech.
            </p>
</div>
<!-- Pagination Dots -->
<div class="flex space-x-sm pt-md">
<div class="w-2 h-2 rounded-full bg-slate-700"></div>
<div class="w-6 h-2 rounded-full bg-gradient-to-r from-secondary to-primary shadow-[0_0_10px_rgba(59,130,246,0.5)]"></div>
<div class="w-2 h-2 rounded-full bg-slate-700"></div>
</div>
</main>
<!-- Footer Controls -->
<footer class="fixed bottom-lg left-0 w-full px-container-padding flex flex-col items-center">
<button class="w-full max-w-sm py-4 rounded-full bg-gradient-to-r from-secondary-container to-primary-container text-white font-label-bold text-body-lg shadow-[0_12px_24px_-8px_rgba(5,102,217,0.5)] active:scale-95 transition-transform duration-150 flex items-center justify-center space-x-sm">
<span>Next</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</footer>
<!-- Image Prompts (Metadata for UI Reference) -->
<!-- [data-alt] "A futuristic, 3D neon audio waveform rendered in electric blue and vibrant purple within a translucent glass cube. The background is a deep space black with soft bokeh particles floating in the void. Soft, cinematic studio lighting emphasizes the crisp edges of the waveform bars, which are glowing intensely. The overall aesthetic is clean, minimalist, and technologically advanced, echoing a high-fidelity AI user interface." -->
</body></html>
